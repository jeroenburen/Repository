alias: "Tesla: Smart Charging"
description: >
  Manages Tesla charging based on location, plug status, solar surplus, and
  Tibber price levels. Handles wake-up, hysteresis, and rate limiting.
mode: restart
triggers:
  - trigger: state
    entity_id: device_tracker.karrotenmobiel_location_tracker
    to: home
  - trigger: state
    entity_id: binary_sensor.karrotenmobiel_plug
    to: "on"
  - trigger: state
    entity_id: sensor.electricity_price_price_level_1_day
  - trigger: state
    entity_id: sensor.p1_meter_power
conditions:
  - condition: state
    entity_id: device_tracker.karrotenmobiel_location_tracker
    state: home
  - condition: state
    entity_id: binary_sensor.karrotenmobiel_plug
    state: "on"
  - condition: state
    entity_id: input_boolean.tesla_fast_charge_selector
    state: "off"
actions:
  - if:
      - condition: not
        conditions:
          - condition: state
            entity_id: sensor.karrotenmobiel_state_of_charge
            state: unavailable
    then: []
    else:
      - action: homeassistant.update_entity
        target:
          entity_id: sensor.karrotenmobiel_state_of_charge
      - delay:
          seconds: 15
  - if:
      - condition: numeric_state
        entity_id: sensor.karrotenmobiel_state_of_charge
        above: 100
    then:
      - action: switch.turn_off
        target:
          entity_id: switch.karrotenmobiel_charger
        data: {}
      - stop: Battery at charge limit, stopping.
  - if:
      - condition: template
        value_template: |
          {{ trigger.entity_id == 'sensor.p1_meter_power' }}
    then:
      - wait_for_trigger:
          - trigger: state
            entity_id: sensor.p1_meter_power
        timeout:
          minutes: 5
        continue_on_timeout: true
      - condition: state
        entity_id: device_tracker.karrotenmobiel_location_tracker
        state: home
      - condition: state
        entity_id: binary_sensor.karrotenmobiel_plug
        state: "on"
  - variables:
      price_level: "{{ states('sensor.electricity_price_price_level_1_day') }}"
      p1_power: "{{ states('sensor.p1_meter_power') | float(0) }}"
      price_is_cheap: |
        {{ price_level in ['VERY_CHEAP', 'CHEAP'] }}
      solar_surplus_watt: |
        {{ [p1_power * -1, 0] | max }}
      solar_amps_raw: |
        {{ (solar_surplus_watt / 690) | int }}
      solar_amps: |
        {{ [[solar_amps_raw, 5] | max, 16] | min }}
      has_solar: |
        {{ solar_surplus_watt > 2000 }}
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ price_is_cheap }}"
        sequence:
          - if:
              - condition: template
                value_template: |
                  {{ states('number.karrotenmobiel_charging_amps') | int != 16
                     or states('switch.karrotenmobiel_charger') == 'off' }}
            then:
              - action: number.set_value
                target:
                  entity_id: number.karrotenmobiel_charging_amps
                data:
                  value: 16
              - action: switch.turn_on
                target:
                  entity_id: switch.karrotenmobiel_charger
      - conditions:
          - condition: template
            value_template: "{{ has_solar }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ states('number.karrotenmobiel_charging_amps') | int !=
                  solar_amps
                     or states('switch.karrotenmobiel_charger') == 'off' }}
            then:
              - action: number.set_value
                target:
                  entity_id: number.karrotenmobiel_charging_amps
                data:
                  value: "{{ solar_amps }}"
              - action: switch.turn_on
                target:
                  entity_id: switch.karrotenmobiel_charger
      - conditions:
          - condition: template
            value_template: "{{ not price_is_cheap and not has_solar }}"
        sequence:
          - if:
              - condition: state
                entity_id: switch.karrotenmobiel_charger
                state: "on"
            then:
              - action: switch.turn_off
                target:
                  entity_id: switch.karrotenmobiel_charger
