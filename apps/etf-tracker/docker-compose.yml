services:
  backend:
    build: ./backend
    container_name: etf-tracker-api
    expose:
      - "5000"
    volumes:
      - etf-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: etf-tracker-ui
    ports:
      - "8181:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  etf-data:
    driver: local
