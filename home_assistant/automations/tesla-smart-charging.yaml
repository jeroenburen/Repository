alias: "Tesla: Smart Charging"
description: >
  Manages Tesla charging based on location, plug status, solar surplus, and
  Tibber price levels. Includes scheduled charging based on future prices, car
  wake-up handling, hysteresis, rate limiting and notifications.

  Required helpers:
    - input_datetime.tesla_charge_ready_by    (time only, 00:00 = disabled)
    - input_number.tesla_charge_target_soc    (default 80, min 20, max 100)
    - input_boolean.tesla_fast_charge_selector (on = scheduled charging active)
triggers:
  - trigger: state
    entity_id: device_tracker.karrotenmobiel_location_tracker
    to: home
    id: car_arrived
  - trigger: state
    entity_id: binary_sensor.karrotenmobiel_charger
    to: "on"
    id: plug_connected
  - trigger: state
    entity_id: sensor.witrikstraat_4_current_price_level
    id: price_changed
  - trigger: numeric_state
    entity_id: sensor.p1_meter_power
    below: -2000
    for:
      minutes: 5
    id: solar_start
  - trigger: numeric_state
    entity_id: sensor.p1_meter_power
    above: -100
    for:
      minutes: 5
    id: solar_stop
  - trigger: time_pattern
    minutes: /15
    id: schedule_check
conditions:
  - condition: state
    entity_id: device_tracker.karrotenmobiel_location_tracker
    state: home
  - condition: state
    entity_id: binary_sensor.karrotenmobiel_charger
    state: "on"
  - condition: numeric_state
    entity_id: sensor.karrotenmobiel_battery
    below: input_number.tesla_charge_target_soc
actions:
  - if:
      - condition: template
        value_template: |
          {{ trigger.id != 'schedule_check'
             and (
               states('sensor.karrotenmobiel_battery') in ['unavailable', 'unknown']
               or states('switch.karrotenmobiel_charger') in ['unavailable', 'unknown']
               or states('number.karrotenmobiel_charging_amps') in ['unavailable', 'unknown']
               or states('binary_sensor.karrotenmobiel_charger') in ['unavailable', 'unknown']
             ) }}
    then:
      - action: button.press
        target:
          entity_id: button.karrotenmobiel_force_data_update
        data: {}
      - variables:
          wake_start: "{{ now().timestamp() }}"
      - repeat:
          sequence:
            - delay:
                seconds: 10
            - action: homeassistant.update_entity
              target:
                entity_id:
                  - sensor.karrotenmobiel_battery
                  - switch.karrotenmobiel_charger
                  - number.karrotenmobiel_charging_amps
                  - binary_sensor.karrotenmobiel_charger
          until:
            - condition: template
              value_template: |
                {{ (
                     states('sensor.karrotenmobiel_battery') not in ['unavailable', 'unknown']
                     and states('switch.karrotenmobiel_charger') not in ['unavailable', 'unknown']
                   )
                   or (now().timestamp() - wake_start) > 90 }}
      - if:
          - condition: template
            value_template: >
              {{ states('sensor.karrotenmobiel_battery') in ['unavailable',
              'unknown']
                 or states('switch.karrotenmobiel_charger') in ['unavailable', 'unknown'] }}
        then:
          - action: persistent_notification.create
            data:
              title: Tesla Charging — Car Unreachable
              message: |
                Could not wake car after 90 seconds. Will retry on next trigger.
              notification_id: tesla_charging_status
          - stop: Car did not wake within timeout.
  - variables:
      current_soc: "{{ states('sensor.karrotenmobiel_battery') | int(0) }}"
      target_soc: "{{ states('input_number.tesla_charge_target_soc') | int(80) }}"
      price_level: "{{ states('sensor.witrikstraat_4_current_price_level') }}"
      p1_power: "{{ states('sensor.p1_meter_power') | float(0) }}"
      price_is_cheap: "{{ price_level in ['very_cheap', 'cheap'] }}"
      solar_surplus_w: "{{ [p1_power * -1, 0] | max }}"
      solar_amps: |
        {{ [[((solar_surplus_w / 690) | int), 5] | max, 16] | min }}
      has_solar: "{{ solar_surplus_w > 1400 }}"
      p_now: "{{ states('sensor.witrikstraat_4_current_price') | float(999) }}"
      p1: "{{ states('sensor.witrikstraat_4_price_next_1h') | float(999) }}"
      p2: "{{ states('sensor.witrikstraat_4_price_next_2h') | float(999) }}"
      p3: "{{ states('sensor.witrikstraat_4_price_next_3h') | float(999) }}"
      p4: "{{ states('sensor.witrikstraat_4_price_next_4h') | float(999) }}"
      p5: "{{ states('sensor.witrikstraat_4_price_next_5h') | float(999) }}"
      cheap_hours: |
        {% set h = namespace(value=1) %} {% if p1 <= p_now %}
          {% set h.value = h.value + 1 %}
          {% if p2 <= p_now %}
            {% set h.value = h.value + 1 %}
            {% if p3 <= p_now %}
              {% set h.value = h.value + 1 %}
              {% if p4 <= p_now %}
                {% set h.value = h.value + 1 %}
                {% if p5 <= p_now %}
                  {% set h.value = h.value + 1 %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endif %} {{ h.value }}
      cheap_amps: >
        {% set energy_needed = (target_soc - current_soc) / 100 * 60 %} {% set
        power_needed_kw = (energy_needed / 0.9) / cheap_hours %} {% set amps =
        (power_needed_kw / 11 * 16) | round(0, 'ceil') | int %} {{ [[amps, 5] |
        max, 16] | min }}
      ready_by: "{{ states('input_datetime.tesla_charge_ready_by') }}"
      schedule_active: "{{ ready_by != '00:00:00' }}"
      fast_charge_on: "{{ states('input_boolean.tesla_fast_charge_selector') == 'on' }}"
      minutes_until_ready: |
        {% if ready_by == '00:00:00' %}
          0
        {% else %}
          {% set t = today_at(ready_by[:5]) %}
          {% if t < now() %}
            {{ ((t + timedelta(days=1) - now()).total_seconds() / 60) | int }}
          {% else %}
            {{ ((t - now()).total_seconds() / 60) | int }}
          {% endif %}
        {% endif %}
      scheduled_amps: >
        {% set energy_needed = (target_soc - current_soc) / 100 * 60 %} {% set
        hours_until_ready = minutes_until_ready / 60 %} {% set power_needed_kw =
        (energy_needed / 0.9) / hours_until_ready %} {% set amps =
        (power_needed_kw / 11 * 16) | round(0, 'ceil') | int %} {{ [[amps, 5] |
        max, 16] | min }}
      trigger_reason: >
        {% if trigger.id == 'car_arrived' %} Car arrived home {% elif trigger.id
        == 'plug_connected' %} Charger plugged in {% elif trigger.id ==
        'price_changed' %} Energy price changed to {{ price_level }} {% elif
        trigger.id == 'solar_start' %} Solar surplus above 2000W for 5 minutes
        {% elif trigger.id == 'solar_stop' %} Solar surplus dropped for 5
        minutes {% elif trigger.id == 'schedule_check' %} Scheduled price check
        {% else %} Manual Trigger {% endif %}
  - if:
      - condition: template
        value_template: "{{ current_soc >= target_soc }}"
    then:
      - action: switch.turn_off
        target:
          entity_id: switch.karrotenmobiel_charger
      - action: persistent_notification.create
        data:
          title: Tesla Charging stopped
          message: |
            Battery has reached {{ target_soc }}% target. Charging stopped.
            Trigger: {{ trigger_reason }}
            Battery: {{ current_soc }}%
          notification_id: tesla_charging_status
      - stop: Battery at charge limit.
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ price_is_cheap }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ states('number.karrotenmobiel_charging_amps') | int(-1) !=
                  cheap_amps
                     or states('switch.karrotenmobiel_charger') == 'off' }}
            then:
              - action: number.set_value
                target:
                  entity_id: number.karrotenmobiel_charging_amps
                data:
                  value: "{{ cheap_amps }}"
              - action: switch.turn_on
                target:
                  entity_id: switch.karrotenmobiel_charger
              - action: persistent_notification.create
                data:
                  title: Tesla Charging started
                  message: >
                    Charging at {{ cheap_amps }}A — price is {{ price_level }}
                    with {{ cheap_hours }}h of cheap pricing remaining.

                    Energy needed: {{ ((target_soc - current_soc) / 100 * 60) |
                    round(1) }} kWh.

                    Trigger: {{ trigger_reason }}

                    Battery: {{ current_soc }}%
                  notification_id: tesla_charging_status
      - conditions:
          - condition: template
            value_template: "{{ has_solar }}"
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ states('number.karrotenmobiel_charging_amps') | int(-1) !=
                  solar_amps
                     or states('switch.karrotenmobiel_charger') == 'off' }}
            then:
              - action: number.set_value
                target:
                  entity_id: number.karrotenmobiel_charging_amps
                data:
                  value: "{{ solar_amps }}"
              - action: switch.turn_on
                target:
                  entity_id: switch.karrotenmobiel_charger
              - action: persistent_notification.create
                data:
                  title: Tesla Charging started (Solar)
                  message: >
                    Charging on solar surplus at {{ solar_amps }}A ({{
                    solar_surplus_w | int }}W export / 690W per phase).

                    Trigger: {{ trigger_reason }}

                    Battery: {{ current_soc }}%
                  notification_id: tesla_charging_status
      - conditions:
          - condition: template
            value_template: |
              {{ fast_charge_on
                 and schedule_active
                 and minutes_until_ready > 0 }}
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ states('number.karrotenmobiel_charging_amps') | int(-1) !=
                  scheduled_amps
                     or states('switch.karrotenmobiel_charger') == 'off' }}
            then:
              - action: number.set_value
                target:
                  entity_id: number.karrotenmobiel_charging_amps
                data:
                  value: "{{ scheduled_amps }}"
              - action: switch.turn_on
                target:
                  entity_id: switch.karrotenmobiel_charger
              - action: persistent_notification.create
                data:
                  title: Tesla Charging started (Scheduled)
                  message: >
                    Charging at {{ scheduled_amps }}A to reach {{ target_soc }}%
                    by {{ ready_by[:5] }}.

                    Energy needed: {{ ((target_soc - current_soc) / 100 * 60) |
                    round(1) }} kWh, time remaining: {{ minutes_until_ready }}
                    min.

                    Trigger: {{ trigger_reason }}

                    Battery: {{ current_soc }}%
                  notification_id: tesla_charging_status
      - conditions:
          - condition: template
            value_template: |
              {{ not price_is_cheap
                 and not has_solar
                 and not (fast_charge_on
                          and schedule_active
                          and minutes_until_ready > 0) }}
        sequence:
          - if:
              - condition: state
                entity_id: switch.karrotenmobiel_charger
                state: "on"
            then:
              - action: switch.turn_off
                target:
                  entity_id: switch.karrotenmobiel_charger
          - action: persistent_notification.create
            data:
              title: Tesla — Not Charging
              message: >
                No solar surplus, price is {{ price_level }}, and no active
                schedule.

                Trigger: {{ trigger_reason }}

                Battery: {{ current_soc }}%
              notification_id: tesla_charging_status
mode: restart
