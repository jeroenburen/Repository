alias: "Tesla Master Charging Logic"
description: "Combineert zon, Tibber en handmatige overrule"
mode: restart # Belangrijk: breekt oude berekeningen af bij nieuwe input

trigger:
  - platform: state
    entity_id: sensor.p1_meter_power
  - platform: state
    entity_id: sensor.electricity_price_witrikstraat_4
  - platform: state
    entity_id: input_boolean.tesla_fast_charge
    to: "on"
  - platform: state
    entity_id: binary_sensor.tesla_charger_connected
    to: "on"

condition:
  - condition: state
    entity_id: binary_sensor.tesla_charger_connected
    state: "on"

action:
  - choose:
      # SCENARIO 1: Handmatige Overrule (Fast Charge aan)
      - conditions:
          - condition: state
            entity_id: input_boolean.tesla_fast_charge
            state: "on"
        sequence:
          - service: number.set_value
            target:
              entity_id: number.tesla_charging_amps
            data:
              value: 16
          - service: switch.turn_on
            target:
              entity_id: switch.tesla_charging_switch

      # SCENARIO 2: Slim Laden (Zon of Tibber < 5 cent)
      - conditions:
          - condition: or
            conditions:
              - condition: numeric_state
                entity_id: sensor.tibber_prices
                below: 0.05
              - condition: numeric_state
                entity_id: sensor.p1_meter_active_power
                below: -1400
        sequence:
          - service: switch.turn_on
            target:
              entity_id: switch.tesla_charging_switch
          - service: number.set_value
            target:
              entity_id: number.tesla_charging_amps
            data:
              # Dynamisch amperage berekenen op basis van zon (bij 1-fase lader)
              # Bij 3-fase lader: deel door 690 ipv 230
              value: >
                {% if states('sensor.tibber_prices') | float < 0.05 %}
                  16
                {% else %}
                  {% set amps = (states('sensor.p1_meter_active_power') | float | abs / 230) | int %}
                  {{ [ [amps, 5]|max , 16]|min }}
                {% endif %}

      # SCENARIO 3: Geen zon, geen lage prijs, geen Fast Charge
      # Hier stoppen we het laden om de 15kWh accu te beschermen
      - conditions:
          - condition: state
            entity_id: input_boolean.tesla_fast_charge
            state: "off"
          - condition: numeric_state
            entity_id: sensor.p1_meter_active_power
            above: -100
        sequence:
          - service: switch.turn_off
            target:
              entity_id: switch.tesla_charging_switch